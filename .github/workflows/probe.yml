name: Probe checkers

# Diagnostic only: runs probe.py to discover which checker endpoints work from
# GitHub's runners. Trigger manually from the Actions tab. Safe to delete once
# checker.py is finalized.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python probe.py
